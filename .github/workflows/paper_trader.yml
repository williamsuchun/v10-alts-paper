name: v10 alts paper trader (hourly)

on:
  schedule:
    - cron: '0 * * * *'        # hourly (GitHub Actions 通常延迟 0-15 min)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: paper-trader
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run paper trader
        run: python paper_trader.py

      - name: Show status
        run: python status.py | head -50

      - name: Commit state + trade log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "paper: $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              sleep 5
            done
          else
            echo "No state changes"
          fi
