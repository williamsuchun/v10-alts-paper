name: v10 alts paper trader (hourly)

on:
  schedule:
    - cron: '*/30 * * * *'     # every 30 min (GH Actions often delays/skips, 2x frequency for better data)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: paper-trader
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run paper trader
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_trader.py

      - name: Show status
        run: python status.py | head -50

      - name: Commit state + trade log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "paper: $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              sleep 5
            done
          else
            echo "No state changes"
          fi

      - name: Notify on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="🚨 <b>paper_trader failed</b>%0A<i>$(date -u +'%Y-%m-%d %H:%M UTC')</i>%0Arun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" -d "parse_mode=HTML" -d "text=${MSG}" >/dev/null
          fi
