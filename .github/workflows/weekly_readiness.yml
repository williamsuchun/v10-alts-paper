name: Weekly Readiness Report

on:
  schedule:
    - cron: '0 0 * * 0'        # Sunday 00:00 UTC (北京周日 8 AM)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run readiness + send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python readiness.py --days 7 --telegram
          if [ -f state/sim_state.json ]; then
            echo "=== SIM comparison ==="
            python readiness.py --days 7 --sim
          fi

      - name: Notify on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="🚨 <b>weekly_readiness failed</b>%0A<i>$(date -u +'%Y-%m-%d %H:%M UTC')</i>%0Arun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" -d "parse_mode=HTML" -d "text=${MSG}" >/dev/null
          fi
